<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porto — Field Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Lora:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --ink: #1c1c1a;
    --ink-mid: rgba(28,28,26,0.45);
    --ink-faint: rgba(28,28,26,0.12);
    --accent: #2d4a3e;
    --accent-warm: #c4602a;
    --line: rgba(28,28,26,0.10);
    --thu: #e0ddf0;
    --thu-ink: #3a2d6a;
    --fri: #dce8e2;
    --fri-ink: #2d4a3e;
    --sat: #e8e0d8;
    --sat-ink: #5a3a1a;
    --flex: #e8e8e4;
    --flex-ink: #4a4a42;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 24px 28px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 6px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--ink);
  }

  header .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    color: var(--ink-mid);
    letter-spacing: 0.5px;
  }

  .header-meta {
    display: flex;
    gap: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-mid);
    margin-bottom: 18px;
    letter-spacing: 0.3px;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-group {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .divider {
    width: 1px;
    height: 16px;
    background: var(--line);
    margin: 0 4px;
    align-self: center;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-mid);
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 5px 11px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.12s ease;
  }

  .filter-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--surface);
  }

  /* ── RESULTS BAR ── */
  .results-bar {
    padding: 10px 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-mid);
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    letter-spacing: 0.3px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    transition: background 0.12s ease;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover { background: var(--bg); }

  /* ── EMOJI AREA ── */
  .card-img-placeholder {
    width: 100%;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    background: var(--bg);
    position: relative;
    border-bottom: 1px solid var(--line);
  }

  /* ── PRIORITY DOT ── */
  .priority-dot {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }
  .priority-dot.high   { background: var(--accent-warm); }
  .priority-dot.medium { background: var(--accent); opacity: 0.5; }
  .priority-dot.low    { background: var(--ink-mid); opacity: 0.3; }

  /* ── STEP BADGE ── */
  .step-badge {
    position: absolute;
    bottom: 8px;
    left: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    color: var(--ink-mid);
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 2px 6px;
    letter-spacing: 0.3px;
  }

  /* ── CARD BODY ── */
  .card-body {
    padding: 16px 18px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 2px;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--ink);
    letter-spacing: -0.1px;
  }

  .card-cat-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 2px 6px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
    border: 1px solid var(--line);
    color: var(--ink-mid);
    background: transparent;
  }

  /* All badges same minimal style */
  .badge-coffee, .badge-pastry, .badge-streetfood, .badge-restaurant,
  .badge-wine-bar, .badge-bar, .badge-church, .badge-viewpoint,
  .badge-sight, .badge-museum, .badge-experience, .badge-shopping { }

  .card-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-mid);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .card-liner {
    font-family: 'Lora', serif;
    font-size: 12.5px;
    font-style: italic;
    color: rgba(28,28,26,0.7);
    line-height: 1.55;
    margin-top: 3px;
    flex: 1;
  }

  /* ── META ── */
  .card-meta {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-mid);
    letter-spacing: 0.3px;
  }

  .meta-icon { font-size: 9px; }

  .day-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 1px;
  }

  .day-thu     { background: var(--thu); color: var(--thu-ink); }
  .day-fri     { background: var(--fri); color: var(--fri-ink); }
  .day-sat     { background: var(--sat); color: var(--sat-ink); }
  .day-flex    { background: var(--flex); color: var(--flex-ink); }
  .day-fri-sat { background: var(--flex); color: var(--flex-ink); }

  /* ── HOURS ── */
  .card-hours {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-mid);
    padding: 0 18px 10px;
    letter-spacing: 0.2px;
  }

  /* ── FOOTER ── */
  .card-footer {
    padding: 10px 18px 14px;
    display: flex;
    gap: 6px;
    border-top: 1px solid var(--line);
  }

  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.4px;
    text-decoration: none;
    padding: 7px 12px;
    transition: all 0.12s ease;
    flex: 1;
    justify-content: center;
    border-radius: 2px;
  }

  .btn-map {
    background: var(--ink);
    color: var(--surface);
    border: 1px solid var(--ink);
  }
  .btn-map:hover { background: var(--accent); border-color: var(--accent); }

  .btn-ig {
    background: transparent;
    color: var(--ink-mid);
    border: 1px solid var(--line);
  }
  .btn-ig:hover { border-color: var(--ink); color: var(--ink); }

  .btn-menu {
    background: transparent;
    color: var(--ink-mid);
    border: 1px solid var(--line);
  }
  .btn-menu:hover { border-color: var(--ink); color: var(--ink); }

  /* ── SECTION LABELS ── */
  .section-label {
    grid-column: 1 / -1;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    border-top: 1px solid var(--line);
    padding: 10px 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-mid);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    padding: 80px 24px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mid);
    letter-spacing: 0.3px;
  }

  /* ── SCROLL TOP ── */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--surface);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 2px;
    font-size: 14px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: background 0.12s ease;
  }
  .scroll-top:hover { background: var(--accent); }
  .scroll-top.visible { display: flex; }

  #type-group .filter-btn {
    font-size: 14px;
    padding: 3px 9px;
    letter-spacing: 0;
  }
  #type-group .filter-btn[data-type="all"] {
    font-size: 10px;
    letter-spacing: 0.6px;
  }
  #type-group .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--surface);
  }

  /* ── VISITED ── */
  .card.visited .card-img-placeholder {
    opacity: 0.45;
  }
  .card.visited .card-name,
  .card.visited .card-liner {
    opacity: 0.45;
    text-decoration: line-through;
    text-decoration-color: var(--ink-faint);
  }
  .card.visited .card-sub,
  .card.visited .card-meta,
  .card.visited .card-hours { opacity: 0.35; }
  .card.visited .card-cat-badge { opacity: 0.35; }

  .btn-visited {
    background: transparent;
    color: var(--ink-mid);
    border: 1px solid var(--line);
    font-size: 11px;
  }
  .btn-visited:hover { border-color: var(--accent); color: var(--accent); }
  .card.visited .btn-visited {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--surface);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
    header { padding: 16px 16px 14px; }
    .header-meta { display: none; }
    .card-img-placeholder { height: 80px; font-size: 26px; }
    .card-body { padding: 12px 14px 10px; }
    .card-footer { padding: 8px 14px 12px; }
    .link-btn { font-size: 9px; padding: 6px 8px; }
  }

  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

function catClass(cat) {
  const map = {
    "Coffee": "badge-coffee",
    "Pastry": "badge-pastry",
    "Streetfood": "badge-streetfood",
    "Restaurant": "badge-restaurant",
    "Wine Bar": "badge-wine-bar",
    "Bar": "badge-bar",
    "Church": "badge-church",
    "Viewpoint": "badge-viewpoint",
    "Sight": "badge-sight",
    "Museum": "badge-museum",
    "Experience": "badge-experience",
    "Shopping": "badge-shopping",
  };
  return map[cat] || "badge-coffee";
}

function dayClass(day) {
  if (day === "Thu") return "day-thu";
  if (day === "Fri") return "day-fri";
  if (day === "Sat") return "day-sat";
  if (day === "Fri/Sat") return "day-fri-sat";
  return "day-flex";
}

function dayLabel(day) {
  if (day === "Thu") return "Thursday";
  if (day === "Fri") return "Friday";
  if (day === "Sat") return "Saturday";
  if (day === "Fri/Sat") return "Fri + Sat";
  return "Flexible";
}

function placeholderBg(cat) {
  return "#f0efec";
}

// Build lookup maps
function buildOrderMap(orderedList) {
  const map = {};
  orderedList.forEach((item, idx) => {
    map[item.name] = { ...item, sortIdx: idx };
  });
  return map;
}

const fridayMap  = buildOrderMap(fridayOrder);
const saturdayMap = buildOrderMap(saturdayOrder);


// ── RENDER WITH SECTIONS ─────────────────────────────────────────────────────

function renderCards(filtered, orderMap, showDist) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('resultsBar').textContent =
    `${filtered.length} place${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No places match this filter.</div>';
    return;
  }

  const isOrdered = !!orderMap;
  let lastSection = null;

  filtered.forEach((p, i) => {
    const meta = orderMap ? orderMap[p.name] : null;

    // Section divider
    if (isOrdered && meta && meta.section !== lastSection) {
      lastSection = meta.section;
      const divider = document.createElement('div');
      divider.className = 'section-label';
      divider.textContent = meta.section;
      grid.appendChild(divider);
    }

    const card = document.createElement('div');
    card.className = 'card' + (visited.has(p.name) ? ' visited' : '');
    card.style.animationDelay = `${Math.min(i * 25, 280)}ms`;

    const bgStyle = `background: ${placeholderBg(p.cat)};`;
    const stepBadge = meta
      ? `<div class="step-badge">${meta.time}</div>`
      : '';
    card.innerHTML = `
      <div class="card-img-placeholder" style="${bgStyle}">
        <span style="font-size:42px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15))">${p.emoji}</span>
        <div class="priority-dot ${p.priority.toLowerCase()}"></div>
        ${stepBadge}
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">${p.name}</div>
          <span class="card-cat-badge ${catClass(p.cat)}">${p.cat}</span>
        </div>
        <div class="card-sub">${p.sub}</div>
        <div class="card-liner">${p.liner}</div>
        <div class="card-meta">
          <span class="meta-item"><span class="meta-icon">🕐</span>${p.when}</span>
          <span class="day-tag ${dayClass(p.day)}">${dayLabel(p.day)}</span>
          ${p.priority === 'High' ? '<span class="meta-item" style="color:var(--accent-warm)">· must</span>' : ''}
          ${showDist && p._dist != null ? `<span class="meta-item" style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:9px">${distanceLabel(p._dist)}</span>` : ''}
        </div>
      </div>
      <div class="card-hours">⏱ ${p.hours}</div>
      <div class="card-footer">
        <a class="link-btn btn-map" href="${p.maps}" target="_blank">📍 Navigate</a>
        ${p.ig ? `<a class="link-btn btn-ig" href="${p.ig}" target="_blank">📸 Instagram</a>` : ''}
        ${p.menu ? `<a class="link-btn btn-menu" href="${p.menu}" target="_blank">📋 Menu</a>` : ''}
        <button class="link-btn btn-visited" data-name="${p.name}">${visited.has(p.name) ? '✓ Done' : '✓ Done'}</button>
      </div>
    `;

    // Wire up visited button after insertion
    card.querySelector('.btn-visited').addEventListener('click', function() {
      toggleVisited(p.name, card, this);
    });
    grid.appendChild(card);
  });
}

// ── VISITED STATE ─────────────────────────────────────────────────────────────

const visited = new Set(JSON.parse(localStorage.getItem('porto-visited') || '[]'));

function saveVisited() {
  localStorage.setItem('porto-visited', JSON.stringify([...visited]));
}

function toggleVisited(name, card, btn) {
  if (visited.has(name)) {
    visited.delete(name);
    card.classList.remove('visited');
    btn.textContent = '✓ Done';
  } else {
    visited.add(name);
    card.classList.add('visited');
    btn.textContent = '✓ Done';
  }
  saveVisited();
  // Re-render if in Done filter
  if (activeCtx === 'done') applyFilters();
}

// ── TWO-LAYER FILTER STATE ────────────────────────────────────────────────────

let activeCtx  = 'all';   // context: all | fri | sat | must | hotel | near-me
let activeType = 'all';   // type:    all | coffee | food | wine | bar | sight | shop
let userLat = null;
let userLng = null;
let nearMeActive = false;

// ── CONTEXT FILTERS ───────────────────────────────────────────────────────────

const nearHotel = new Set([
  "Ar de Rio","Enoteca 17.56","7g Roaster (Gaia)","Espaço Porto Cruz",
  "Guindalense FC","Casa Tão Longe, Tão Perto","Jardim do Morro",
  "Serra do Pilar","7g Roaster","Casa Tão Longe",
]);

const ctxFn = {
  'all':     { fn: () => true,                                           order: null    },
  'thu':     { fn: p => p.day === 'Thu',                                 order: null    },
  'fri':     { fn: p => p.day === 'Fri' || p.day === 'Fri/Sat',         order: fridayMap },
  'sat':     { fn: p => p.day === 'Sat' || p.day === 'Fri/Sat',         order: saturdayMap },
  'must':    { fn: p => p.priority === 'High',                           order: null    },
  'hotel':   { fn: p => nearHotel.has(p.name),                          order: null    },
  'done':    { fn: p => visited.has(p.name),                            order: null    },
  'near-me': { fn: () => true,                                           order: null    },
};

// ── TYPE FILTERS ──────────────────────────────────────────────────────────────

const typeFn = {
  'all':    () => true,
  'coffee': p => ['Coffee','Pastry','Cafe'].includes(p.cat),
  'food':   p => ['Restaurant','Streetfood'].includes(p.cat),
  'wine':   p => p.cat === 'Wine Bar',
  'bar':    p => p.cat === 'Bar',
  'sight':  p => ['Sight','Church','Viewpoint','Museum','Experience'].includes(p.cat),
  'shop':   p => p.cat === 'Shopping',
};

// ── APPLY BOTH FILTERS ────────────────────────────────────────────────────────

function applyFilters() {
  const { fn: cFn, order } = ctxFn[activeCtx];
  const tFn = typeFn[activeType];

  let filtered = places.filter(p => cFn(p) && tFn(p));

  // Near Me: sort by distance
  if (activeCtx === 'near-me' && userLat !== null) {
    filtered = sortByDistance(filtered);
    renderCards(filtered, null, true);
    document.getElementById('resultsBar').textContent =
      `${filtered.length} place${filtered.length !== 1 ? 's' : ''} · sorted by distance`;
    return;
  }

  // Itinerary order for fri/sat
  if (order) {
    filtered = filtered.slice().sort((a, b) => {
      const ai = order[a.name]?.sortIdx ?? 999;
      const bi = order[b.name]?.sortIdx ?? 999;
      return ai - bi;
    });
  }

  renderCards(filtered, order || null, false);

  const typeLabel = activeType === 'all' ? '' : ` · ${activeType}`;
  document.getElementById('resultsBar').textContent =
    `${filtered.length} place${filtered.length !== 1 ? 's' : ''}${typeLabel}`;
}

document.querySelectorAll('#ctx-group .filter-btn:not(#nearMeBtn)').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#ctx-group .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCtx = btn.dataset.ctx;
    nearMeActive = false;
    document.getElementById('nearMeBtn').textContent = '📍 Near Me';
    applyFilters();
  });
});

document.querySelectorAll('.type-btn').forEach(btn => {

    btn.classList.add('active');
    activeType = btn.dataset.type;
    applyFilters();
  });
});

// ── NEAR ME ───────────────────────────────────────────────────────────────────

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
            Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function distanceLabel(km) {
  return km < 1 ? Math.round(km * 1000) + 'm' : km.toFixed(1) + 'km';
}

function sortByDistance(list) {
  return list
    .filter(p => p.lat && p.lng)
    .map(p => ({ ...p, _dist: haversine(userLat, userLng, p.lat, p.lng) }))
    .sort((a, b) => a._dist - b._dist)
    .concat(list.filter(p => !p.lat || !p.lng));
}

document.getElementById('nearMeBtn').addEventListener('click', () => {
  const btn = document.getElementById('nearMeBtn');

  if (!navigator.geolocation) { btn.textContent = '📍 No GPS'; return; }

  btn.textContent = '📍 Locating…';

  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      document.querySelectorAll('#ctx-group .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      btn.textContent = '📍 Near Me';
      activeCtx = 'near-me';
      applyFilters();
    },
    () => {
      btn.textContent = '📍 Near Me';
      alert('Could not get your location.');
    },
    { timeout: 8000, maximumAge: 60000 }
  );
});

// Scroll top
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
});

// Initial render
applyFilters();
