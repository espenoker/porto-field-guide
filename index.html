<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porto — Field Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --cream: #f5f0e8;
    --warm: #f0e6d0;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #b85c38;
    --tile-blue: #2a5f7e;
    --tile-blue-light: #d4e8f0;
    --sage: #5c7a5c;
    --sage-light: #d8e8d8;
    --border: rgba(26,18,8,0.12);
    --shadow: 0 2px 16px rgba(26,18,8,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 32px 24px 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--gold);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header .subtitle {
    font-size: 12px;
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-meta {
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--gold-light);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--ink); }

  .divider { width: 1px; background: rgba(255,255,255,0.2); margin: 0 4px; }

  /* RESULTS COUNT */
  .results-bar {
    padding: 14px 24px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(26,18,8,0.45);
    border-bottom: 1px solid var(--border);
    background: var(--warm);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 0;
    padding: 0;
  }

  /* CARD */
  .card {
    background: var(--cream);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: background 0.15s ease;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover { background: var(--warm); }

  .card.hidden { display: none; }

  /* IMAGE AREA */
  .card-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    background: var(--warm);
    position: relative;
    overflow: hidden;
  }

  .card-img-placeholder {
    width: 100%;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    background: var(--warm);
    position: relative;
  }

  /* PRIORITY BADGE */
  .priority-dot {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid white;
  }
  .priority-dot.high { background: var(--rust); }
  .priority-dot.medium { background: var(--gold); }
  .priority-dot.low { background: #aaa; }

  /* CARD BODY */
  .card-body {
    padding: 16px 18px 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--ink);
  }

  .card-cat-badge {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* Category colors */
  .badge-coffee { background: #f5e6c8; color: #7a5200; }
  .badge-pastry { background: #fde8d8; color: #8a3800; }
  .badge-streetfood { background: #e8f5e8; color: #2a6a2a; }
  .badge-restaurant { background: #f5e8f5; color: #6a2a6a; }
  .badge-wine-bar { background: #ede8f5; color: #3a2a6a; }
  .badge-bar { background: #e8eef5; color: #1a3a5a; }
  .badge-church { background: #f5f0e0; color: #5a4a10; }
  .badge-viewpoint { background: #e0f5e0; color: #1a5a1a; }
  .badge-sight { background: #e8f0f8; color: #1a3a5a; }
  .badge-museum { background: #f0e8e8; color: #5a1a1a; }
  .badge-experience { background: #e0eef5; color: #1a4a5a; }
  .badge-shopping { background: #f8f0e8; color: #5a3a10; }

  .card-sub {
    font-size: 11px;
    color: rgba(26,18,8,0.45);
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  .card-liner {
    font-size: 13px;
    color: rgba(26,18,8,0.75);
    line-height: 1.5;
    margin-top: 2px;
    flex: 1;
  }

  /* META ROW */
  .card-meta {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: rgba(26,18,8,0.5);
  }

  .meta-icon { font-size: 11px; }

  .day-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
  }

  .day-fri { background: #d4e8f0; color: var(--tile-blue); }
  .day-sat { background: #d8e8d8; color: var(--sage); }
  .day-flex { background: #f0e8d0; color: #7a5200; }
  .day-fri-sat { background: #ede8f5; color: #5a2a7a; }

  /* CARD FOOTER */
  .card-footer {
    padding: 10px 18px 14px;
    display: flex;
    gap: 8px;
    border-top: 1px solid var(--border);
  }

  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 4px;
    transition: all 0.15s ease;
    flex: 1;
    justify-content: center;
  }

  .btn-map {
    background: var(--ink);
    color: var(--cream);
    border: 1px solid var(--ink);
  }
  .btn-map:hover { background: var(--tile-blue); border-color: var(--tile-blue); }

  .btn-ig {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--border);
  }
  .btn-ig:hover { border-color: var(--gold); color: var(--gold); }

  /* HOURS */
  .card-hours {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(26,18,8,0.4);
    padding: 0 18px 10px;
  }

  /* STEP / TIME BADGE */
  .step-badge {
    position: absolute;
    bottom: 10px;
    left: 12px;
    background: var(--ink);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 3px;
  }

  /* SECTION LABELS */
  .section-label {
    grid-column: 1 / -1;
    background: var(--ink);
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    letter-spacing: 2px;
    padding: 10px 24px;
    text-transform: uppercase;
  }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1 / -1;
    padding: 60px 24px;
    text-align: center;
    color: rgba(26,18,8,0.35);
    font-size: 14px;
  }

  /* SUNSET SPECIAL */
  .card.sunset-card .card-img-placeholder {
    background: linear-gradient(160deg, #f5a623 0%, #e8607a 50%, #2a3a7e 100%);
  }

  /* SCROLL TO TOP */
  .scroll-top {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--ink);
    color: var(--gold);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
    z-index: 200;
  }

  .scroll-top.visible { display: flex; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
    header { padding: 20px 16px 16px; }
    .header-meta { display: none; }
    .card-name { font-size: 14px; }
    .card-img-placeholder { height: 120px; font-size: 32px; }
    .card-body { padding: 12px 14px 10px; }
    .card-footer { padding: 8px 14px 12px; }
    .link-btn { font-size: 10px; padding: 5px 8px; }
  }

  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  if (day === "Sat") return "day-sat";

  return "day-flex";
}

  if (day === "Fri") return "Friday";

  return "Flexible";
}

function renderCards(filtered, orderMap) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('resultsBar').textContent =
    `${filtered.length} place${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No places match this filter.</div>';
    return;
  }

  const isOrdered = !!orderMap;
  let lastSection = null;

  filtered.forEach((p, i) => {
    const meta = orderMap ? orderMap[p.name] : null;

    // Section divider
    if (isOrdered && meta && meta.section !== lastSection) {
      lastSection = meta.section;
      const divider = document.createElement('div');
      divider.className = 'section-label';
      divider.textContent = meta.section;
      grid.appendChild(divider);
    }

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i * 25, 280)}ms`;

    const bgStyle = `background: ${placeholderBg(p.cat)};`;
    const stepBadge = meta
      ? `<div class="step-badge">${meta.time}</div>`
      : '';
    const photoUrl = getPhotoUrl(p.name, p.pid);

    const fallbackHtml = `<div class="card-img-placeholder" style="${bgStyle}"><span style="font-size:42px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15))">${p.emoji}</span><div class="priority-dot ${p.priority.toLowerCase()}"></div>${stepBadge}</div>`;
    const imgHtml = photoUrl
      ? `<div class="card-photo-wrap"><img class="card-photo" src="${photoUrl}" alt="${p.name}" onerror="this.closest('.card-photo-wrap').outerHTML='${fallbackHtml.replace(/'/g, "\\'")}'" loading="lazy"><div class="priority-dot ${p.priority.toLowerCase()}"></div>${stepBadge}</div>`
      : fallbackHtml;

    card.innerHTML = imgHtml + `
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">${p.name}</div>
          <span class="card-cat-badge ${catClass(p.cat)}">${p.cat}</span>
        </div>
        <div class="card-sub">${p.sub}</div>
        <div class="card-liner">${p.liner}</div>
        <div class="card-meta">
          <span class="meta-item"><span class="meta-icon">🕐</span>${p.when}</span>
          <span class="day-tag ${dayClass(p.day)}">${dayLabel(p.day)}</span>
          ${p.priority === 'High' ? '<span class="meta-item" style="color:#b85c38;">⭐ Must</span>' : ''}
        </div>
      </div>
      <div class="card-hours">⏱ ${p.hours}</div>
      <div class="card-footer">
        <a class="link-btn btn-map" href="${p.maps}" target="_blank">📍 Navigate</a>
        ${p.ig ? `<a class="link-btn btn-ig" href="${p.ig}" target="_blank">📸 Instagram</a>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── FILTER LOGIC ─────────────────────────────────────────────────────────────

const nearHotel = new Set([
  "Ar de Rio","Enoteca 17.56","7g Roaster (Gaia)","Espaço Porto Cruz",
  "Guindalense FC","Casa Tão Longe, Tão Perto","Jardim do Morro",
  "Serra do Pilar","7g Roaster","Casa Tão Longe",
]);

const filterMap = {
  'all':           { fn: () => true,                                            order: null },
  'day-fri':       { fn: p => p.day === 'Fri' || p.day === 'Fri/Sat',          order: fridayMap },
  'day-sat':       { fn: p => p.day === 'Sat' || p.day === 'Fri/Sat',          order: saturdayMap },
  'cat-coffee':    { fn: p => ['Coffee','Pastry'].includes(p.cat),              order: null },
  'cat-food':      { fn: p => ['Restaurant','Streetfood'].includes(p.cat),      order: null },
  'cat-wine':      { fn: p => p.cat === 'Wine Bar',                             order: null },
  'cat-bar':       { fn: p => p.cat === 'Bar',                                  order: null },
  'cat-sight':     { fn: p => ['Sight','Church','Viewpoint','Museum','Experience'].includes(p.cat), order: null },
  'cat-shop':      { fn: p => p.cat === 'Shopping',                             order: null },
  'priority-high': { fn: p => p.priority === 'High',                            order: null },
  'near-hotel':    { fn: p => nearHotel.has(p.name),                            order: null },
};

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const key = btn.dataset.filter;
    const { fn, order } = filterMap[key];

    let filtered = places.filter(fn);

    if (order) {
      // Sort by itinerary order; unmatched fall to end
      filtered = filtered.slice().sort((a, b) => {
        const ai = order[a.name]?.sortIdx ?? 999;
        const bi = order[b.name]?.sortIdx ?? 999;
        return ai - bi;
      });
    }

    renderCards(filtered, order);
  });
});

// Scroll top
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
});

// Initial render
renderCards(places, null);
</script>
</body>
</html>
